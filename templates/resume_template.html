<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Resume</title>
  <style>
    body {
      font-family: Arial, Helvetica, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 20px;
    }
    .resume {
      max-width: 900px;
      margin: auto;
      background: #ffffff;
      padding: 40px;
      color: #333;
      line-height: 1.6;
    }
    h1 {
      font-size: 28px;
      margin-bottom: 5px;
      text-transform: uppercase;
    }
    .contact {
      font-size: 14px;
      color: #555;
      margin-bottom: 25px;
    }
    h2 {
      font-size: 18px;
      border-bottom: 2px solid #333;
      padding-bottom: 5px;
      margin-top: 30px;
      margin-bottom: 15px;
      text-transform: uppercase;
    }
    p {
      margin: 8px 0;
      font-size: 14px;
    }
    ul {
      margin: 10px 0 20px 20px;
      padding: 0;
    }
    ul li {
      font-size: 14px;
      margin-bottom: 8px;
    }
    .skills-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px 40px;
      font-size: 14px;
    }
    .job {
      margin-bottom: 20px;
    }
    .job-title {
      font-weight: bold;
      font-size: 15px;
    }
    .job-date {
      float: right;
      font-size: 13px;
      color: #555;
    }
    .company {
      font-style: italic;
      margin-bottom: 5px;
    }
    .education-item {
      margin-bottom: 10px;
    }
    @media print {
      body {
        background: none;
        padding: 0;
      }
      .resume {
        box-shadow: none;
        padding: 0;
      }
    }
  </style>
  </head>
  <body>
    <div class="resume">
      <h1>{{FULL_NAME}}</h1>
      <div class="contact">
        {{EMAIL}} | {{PHONE}} | {{LOCATION}}
      </div>
      <h2>Professional Summary</h2>
      <p>{{SUMMARY}}</p>
      <h2>Technical Skills</h2>
      <div class="skills-grid">
        {{SKILLS_GRID}}
      </div>
      <h2>Work Experience</h2>
      <div class="job">
        <div class="job-title">
          {{JOB_TITLE}}
          <span class="job-date">{{JOB_DATE}}</span>
        </div>
        <div class="company">{{JOB_COMPANY}}</div>
        <ul>
          {{EXPERIENCE_ITEMS}}
        </ul>
      </div>
      <h2>Education</h2>
      <div class="education-item">
        {{EDUCATION}}
      </div>
    </div>
  </body>
</html>
